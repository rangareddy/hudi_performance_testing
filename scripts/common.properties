# Hudi Performance Testing - Common Configuration

# ---------------------------------------------------------------------------
# Versions
# ---------------------------------------------------------------------------
SOURCE_HUDI_VERSION=0.15.0
TARGET_HUDI_VERSION=0.15.1
HUDI_VERSION=$TARGET_HUDI_VERSION
HUDI_VERSIONS=$SOURCE_HUDI_VERSION,$TARGET_HUDI_VERSION
SPARK_VERSION=3.5.6
IS_USE_INSTALLED_SPARK=true
TEMP_SPARK_HOME=/usr/lib/spark
SCALA_VERSION=2.12
HADOOP_VERSION=3.3.4
HADOOP_MAJOR_VERSION=$(echo "${HADOOP_VERSION}" | cut -d '.' -f 1)
AWS_JAVA_SDK_BUNDLE_VERSION=1.12.262
IS_LOGICAL_TIMESTAMP_ENABLED=false
IS_LOCAL_RUN=false

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
DEST_DIR=$HOME/hudi_performace_testing
SPARK_HOME=$HOME/spark-$SPARK_VERSION-bin-hadoop$HADOOP_MAJOR_VERSION
BASE_PATH=s3://performance-benchmark-datasets-us-west-2/hudi-bench/performance/logical_ts_perf
S3_JARS_PATH=$BASE_PATH/jars
JARS_PATH=$DEST_DIR/jars
DATA_PATH=$BASE_PATH/data
SCRIPTS_DIR=$DEST_DIR/scripts
INITIAL_BATCH_SCALA=$SCRIPTS_DIR/initial_batch.scala
INCREMENTAL_SCRIPT=$SCRIPTS_DIR/incremental_batch.py
PY_SCRIPT=$SCRIPTS_DIR/hudi_benchmark.py
PROPS_FILE=$SCRIPTS_DIR/hoodie.properties
SPARK_DEFAULTS_CONF=$SCRIPTS_DIR/spark-defaults.conf

NUM_OF_COLUMNS=500
NUM_OF_PARTITIONS=2000
NUM_OF_RECORDS_PER_PARTITION=1
NUM_OF_RECORDS_TO_UPDATE=100
NUM_OF_FILE_GROUPS_TO_TOUCH=100

IS_REPEAT_SAME_BATCH=true
READ_PERFORMANCE_ITERATIONS=1

BASE_TABLE_NAME=hudi_regular