# Hudi Performance Testing - Common Configuration

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
SPARK_HOME=/home/hadoop/spark-3.4.1-bin-hadoop3
BASE_S3_PATH=s3://performance-benchmark-datasets-us-west-2/hudi-bench/performance
BASE_PATH=$BASE_S3_PATH/logical_ts_perf
JARS_PATH=$BASE_PATH/jars
DATA_PATH=$BASE_PATH/data
DEST_DIR=$HOME/hudi_performace_testing

# ---------------------------------------------------------------------------
# Versions
# ---------------------------------------------------------------------------
HUDI_VERSION=0.14.2-SNAPSHOT
SPARK_VERSION=3.4

# ---------------------------------------------------------------------------
# Script and data paths
# ---------------------------------------------------------------------------
INITIAL_BATCH_SCALA=$DEST_DIR/initial_batch.scala
INCREMENTAL_SCRIPT=$DEST_DIR/incremental_batch.py
PY_SCRIPT=$DEST_DIR/hudi_benchmark.py
SCHEMA_FILE=$DEST_DIR/full_schema.avsc
PROPS_FILE=$DEST_DIR/hoodie.properties

# ---------------------------------------------------------------------------
# Spark defaults (driver / executor / shuffle)
# ---------------------------------------------------------------------------
SPARK_DRIVER_MEMORY=4g
SPARK_EXECUTOR_MEMORY=8g
SPARK_EXECUTOR_CORES=3
SPARK_EXECUTOR_INSTANCES=3
SPARK_SHUFFLE_PARTITIONS=200
SPARK_DEFAULT_PARALLELISM=9
SPARK_EVENT_LOG_DIR=hdfs:///var/log/spark/apps

# ---------------------------------------------------------------------------
# Hudi table
# ---------------------------------------------------------------------------
BASE_TABLE_NAME=hudi_logical
